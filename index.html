function Section({section}){
  const mono={fontFamily:"'Share Tech Mono',monospace"};
  if(section.type==="formula-big") return(
    <div style={{background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"16px 18px",marginBottom:12}}>
      <p style={{color:"#64748B",fontSize:11,marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>{section.title}</p>
      <p style={{...mono,color:"#F1F5F9",fontSize:16,fontWeight:700}}>{section.content}</p>
    </div>
  );
  if(section.type==="formula-list") return(
    <div style={{background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"14px 18px",marginBottom:12}}>
      <p style={{color:"#64748B",fontSize:11,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>{section.title}</p>
      {section.items.map((f,i)=><p key={i} style={{...mono,color:"#F1F5F9",fontSize:14,marginBottom:5,paddingLeft:8,borderLeft:"2px solid rgba(255,255,255,0.15)"}}>{f}</p>)}
    </div>
  );
  if(section.type==="table") return(
    <div style={{marginBottom:12}}>
      <p style={{color:"#64748B",fontSize:11,marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>{section.title}</p>
      <div style={{borderRadius:10,overflow:"hidden",border:"1px solid rgba(255,255,255,0.08)"}}>
        {section.rows.map((row,i)=>(
          <div key={i} style={{display:"grid",gridTemplateColumns:`repeat(${row.length},1fr)`,background:i===0?"rgba(255,255,255,0.07)":i%2===0?"rgba(255,255,255,0.02)":"transparent"}}>
            {row.map((cell,j)=>(
              <div key={j} style={{padding:"8px 10px",color:i===0?"#94A3B8":"#E2E8F0",fontSize:i===0?11:13,fontWeight:i===0?600:400,borderRight:j<row.length-1?"1px solid rgba(255,255,255,0.06)":"none"}}>{cell}</div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
  if(section.type==="rules") return(
    <div style={{marginBottom:12}}>
      <p style={{color:"#64748B",fontSize:11,marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>{section.title}</p>
      {section.items.map((item,i)=>(
        <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:6,background:"rgba(255,255,255,0.03)",borderRadius:8,padding:"8px 10px"}}>
          <span style={{color:"#F59E0B",fontWeight:700,flexShrink:0}}>→</span>
          <p style={{color:"#E2E8F0",fontSize:13}}>{item}</p>
        </div>
      ))}
    </div>
  );
  if(section.type==="example") return(
    <div style={{background:"rgba(16,185,129,0.07)",border:"1px solid rgba(16,185,129,0.2)",borderRadius:12,padding:"12px 14px",marginBottom:12}}>
      <p style={{color:"#10B981",fontSize:11,marginBottom:5,textTransform:"uppercase",letterSpacing:1}}>📝 {section.title}</p>
      <pre style={{...mono,color:"#E2E8F0",fontSize:13,whiteSpace:"pre-wrap"}}>{section.content}</pre>
    </div>
  );
  if(section.type==="mnemonic") return(
    <div style={{background:"rgba(249,115,22,0.08)",border:"1px solid rgba(249,115,22,0.2)",borderRadius:12,padding:"12px 14px",marginBottom:12}}>
      <p style={{color:"#F97316",fontSize:11,marginBottom:5,textTransform:"uppercase",letterSpacing:1}}>💡 Memory Trick</p>
      <p style={{color:"#E2E8F0",fontSize:13,fontStyle:"italic"}}>{section.content}</p>
    </div>
  );
  if(section.type==="color-table") return(
    <div style={{marginBottom:12}}>
      <p style={{color:"#64748B",fontSize:11,marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>{section.title}</p>
      <div style={{borderRadius:10,overflow:"hidden",border:"1px solid rgba(255,255,255,0.08)"}}>
        <div style={{display:"grid",gridTemplateColumns:"24px 1fr 50px 50px 50px",background:"rgba(255,255,255,0.07)",padding:"7px 10px"}}>

          <div key={i} style={{display:"grid",gridTemplateColumns:"24px 1fr 50px 50px 50px",alignItems:"center",padding:"6px 10px",background:i%2===0?"rgba(255,255,255,0.02)":"transparent",borderTop:"1px solid rgba(255,255,255,0.05)"}}>

            <span style={{color:"#94A3B8",fontSize:12}}>{row.mult}</span>
            <span style={{color:"#94A3B8",fontSize:12}}>{row.tol||""}</span>
          </div>
        ))}
      </div>
    </div>
  );
  return null;
}

function Calculator(){
  const [vals,setVals]=useState({V:"",I:"",R:"",P:""});
  const [result,setResult]=useState(null);
  const [error,setError]=useState("");
  const set=(k,v)=>setVals(p=>({...p,[k]:v}));
  const solve=()=>{
    setError("");setResult(null);
    const n={};
    for(const k of["V","I","R","P"]){if(vals[k]!==""){const p=parseFloat(vals[k]);if(isNaN(p)||p<0){setError("Enter valid positive numbers.");return;}n[k]=p;}}
    if(Object.keys(n).length<2){setError("Enter at least 2 known values.");return;}
    let{V,I,R,P}=n;
    if(V!==undefined&&I!==undefined){R=R??V/I;P=P??V*I;}
    else if(V!==undefined&&R!==undefined){I=I??V/R;P=P??V*V/R;}
    else if(I!==undefined&&R!==undefined){V=V??I*R;P=P??I*I*R;}
    else if(P!==undefined&&V!==undefined){I=I??P/V;R=R??V*V/P;}
    else if(P!==undefined&&I!==undefined){V=V??P/I;R=R??P/(I*I);}
    else if(P!==undefined&&R!==undefined){I=I??Math.sqrt(P/R);V=V??Math.sqrt(P*R);}
    else{setError("Cannot solve with these two values.");return;}
    const fmt=x=>x!==undefined?(Math.round(x*10000)/10000).toString():"—";
    setResult({V:fmt(V),I:fmt(I),R:fmt(R),P:fmt(P)});
  };
  const reset=()=>{setVals({V:"",I:"",R:"",P:""});setResult(null);setError("");};
  return(
    <div style={{background:"rgba(255,255,255,0.04)",borderRadius:14,padding:18,marginTop:8}}>
      <p style={{color:"#94A3B8",fontSize:12,marginBottom:12}}>Enter any 2 known values — the rest will be calculated.</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
        {[["V","Voltage","V"],["I","Current","A"],["R","Resistance","Ω"],["P","Power","W"]].map(([k,label,unit])=>(
          <div key={k}>
            <label style={{color:"#94A3B8",fontSize:11,display:"block",marginBottom:3}}>{label}</label>
            <div style={{display:"flex",alignItems:"center",background:"rgba(255,255,255,0.06)",borderRadius:8,border:"1px solid rgba(255,255,255,0.1)"}}>
              <input type="number" value={vals[k]} onChange={e=>set(k,e.target.value)} placeholder="?" style={{flex:1,background:"transparent",border:"none",outline:"none",color:"#F1F5F9",padding:"9px 10px",fontSize:15}}/>
              <span style={{color:"#64748B",fontSize:11,paddingRight:8}}>{unit}</span>
            </div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <button onClick={solve} style={{flex:1,background:"#F59E0B",color:"#000",border:"none",borderRadius:8,padding:"10px 0",fontWeight:700,fontSize:14,cursor:"pointer"}}>Calculate ⚡</button>
        <button onClick={reset} style={{background:"rgba(255,255,255,0.08)",color:"#94A3B8",border:"none",borderRadius:8,padding:"10px 14px",cursor:"pointer"}}>Reset</button>
      </div>
      {error&&<p style={{color:"#EF4444",fontSize:12,marginBottom:10}}>⚠️ {error}</p>}
      {result&&(
        <div style={{background:"rgba(245,158,11,0.08)",border:"1px solid rgba(245,158,11,0.3)",borderRadius:12,padding:14}}>
          <p style={{color:"#F59E0B",fontWeight:700,marginBottom:10,fontSize:12}}>RESULTS</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {[["V","Voltage","V"],["I","Current","A"],["R","Resistance","Ω"],["P","Power","W"]].map(([k,label,unit])=>(
              <div key={k} style={{background:"rgba(255,255,255,0.05)",borderRadius:8,padding:"8px 12px"}}>
                <div style={{color:"#64748B",fontSize:11,marginBottom:2}}>{label}</div>
                <div style={{color:"#F1F5F9",fontSize:17,fontWeight:700}}>{result[k]} <span style={{fontSize:11,color:"#94A3B8"}}>{unit}</span></div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function Quiz(){
  const questions=[
    {q:"What is Ohm's Law?",options:["V = I × R","V = I + R","V = I / R","V = I - R"],ans:0},
    {q:"In a series circuit, what stays the same?",options:["Voltage","Current","Resistance","Power"],ans:1},
    {q:"In a parallel circuit, what stays the same?",options:["Current","Resistance","Voltage","Power"],ans:2},
    {q:"What unit measures electrical resistance?",options:["Volt","Ampere","Watt","Ohm"],ans:3},
    {q:"What does the 'Brown' band on a resistor represent?",options:["0","1","2","3"],ans:1},
    {q:"Which current level can cause ventricular fibrillation?",options:["1 mA","5 mA","50 mA","1 A"],ans:3},
    {q:"What is the formula for electrical power?",options:["P = V / I","P = V + I","P = V × I","P = V - I"],ans:2},
    {q:"What frequency is used for mains power in the US?",options:["50 Hz","60 Hz","100 Hz","120 Hz"],ans:1},
  ];
  const [current,setCurrent]=useState(0);
  const [selected,setSelected]=useState(null);
  const [score,setScore]=useState(0);
  const [done,setDone]=useState(false);
  const choose=(i)=>{
    if(selected!==null)return;
    setSelected(i);
    if(i===questions[current].ans)setScore(s=>s+1);
  };
  const next=()=>{
    if(current+1>=questions.length){setDone(true);}
    else{setCurrent(c=>c+1);setSelected(null);}
  };
  const restart=()=>{setCurrent(0);setSelected(null);setScore(0);setDone(false);};
  if(done) return(
    <div style={{textAlign:"center",padding:"30px 0"}}>
      <div style={{fontSize:48,marginBottom:12}}>{score>=6?"🎉":"📚"}</div>
      <p style={{fontSize:22,fontWeight:800,marginBottom:6}}>Quiz Complete!</p>
      <p style={{color:"#94A3B8",marginBottom:4}}>You scored</p>
      <p style={{fontSize:40,fontWeight:800,color:score>=6?"#10B981":"#F59E0B"}}>{score}/{questions.length}</p>
      <p style={{color:"#64748B",marginBottom:20,fontSize:13}}>{score>=6?"Great job!":"Keep studying!"}</p>
      <button onClick={restart} style={{background:"#F59E0B",color:"#000",border:"none",borderRadius:10,padding:"12px 28px",fontWeight:700,fontSize:15,cursor:"pointer"}}>Try Again</button>
    </div>
  );
  const q=questions[current];
  return(
    <div style={{padding:"8px 0"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
        <span style={{color:"#64748B",fontSize:13}}>Question {current+1}/{questions.length}</span>
        <span style={{color:"#F59E0B",fontWeight:700}}>Score: {score}</span>
      </div>
      <div style={{background:"rgba(255,255,255,0.05)",borderRadius:12,padding:16,marginBottom:16}}>
        <p style={{fontSize:16,fontWeight:600,lineHeight:1.5}}>{q.q}</p>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
        {q.options.map((opt,i)=>{
          let bg="rgba(255,255,255,0.04)";let border="1px solid rgba(255,255,255,0.08)";let color="#E2E8F0";
          if(selected!==null){
            if(i===q.ans){bg="rgba(16,185,129,0.15)";border="1px solid #10B981";color="#10B981";}
            else if(i===selected&&i!==q.ans){bg="rgba(239,68,68,0.15)";border="1px solid #EF4444";color="#EF4444";}
          }
          return(
            <button key={i} onClick={()=>choose(i)} style={{background:bg,border,borderRadius:10,padding:"12px 14px",color,textAlign:"left",fontSize:14,cursor:"pointer",fontFamily:"'Barlow',sans-serif"}}>
              {String.fromCharCode(65+i)}. {opt}
            </button>
          );
        })}
      </div>
      {selected!==null&&(
        <button onClick={next} style={{width:"100%",background:"#F59E0B",color:"#000",border:"none",borderRadius:10,padding:"12px 0",fontWeight:700,fontSize:15,cursor:"pointer"}}>
          {current+1>=questions.length?"See Results →":"Next Question →"}
        </button>
      )}
    </div>
  );
}

            <p style={{color:"#64748B",fontSize:11,marginTop:2}}>Ohm's Law solver</p>
          </div>
          <div onClick={()=>{setShowQuiz(v=>!v);setShowCalc(false);}} style={{flex:1,background:showQuiz?"rgba(16,185,129,0.15)":"rgba(255,255,255,0.04)",border:`1px solid ${showQuiz?"rgba(16,185,129,0.4)":"rgba(255,255,255,0.08)"}`,borderRadius:12,padding:"12px 14px",cursor:"pointer"}}>
            <p style={{color:"#10B981",fontWeight:700,fontSize:14}}>🧠 Quiz Mode</p>
            <p style={{color:"#64748B",fontSize:11,marginTop:2}}>Test your knowledge</p>
          </div>
        </div>
        {showCalc&&<div style={{padding:"0 14px"}}><Calculator/></div>}
        {showQuiz&&<div style={{padding:"0 14px",marginTop:12,background:"rgba(255,255,255,0.03)",borderRadius:14,margin:"8px 14px 0"}}><Quiz/></div>}
        <div style={{overflowX:"auto",padding:"12px 14px 0"}}>
          <div style={{display:"flex",gap:6,width:"max-content"}}>
            {(search?filtered:categories).map(cat=>(
              <button key={cat.id} onClick={()=>{setActiveId(cat.id);setSearch("");}} style={{background:activeId===cat.id?cat.color:"rgba(255,255,255,0.05)",color:activeId===cat.id?"#000":"#94A3B8",border:"none",borderRadius:8,padding:"7px 12px",fontWeight:activeId===cat.id?700:500,fontSize:12,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"'Barlow',sans-serif"}}>
                {cat.icon} {cat.title}
              </button>
            ))}
          </div>
        </div>
        <div style={{padding:"12px 14px 0"}}>
          {(search?filtered:[active]).map(cat=>cat&&(
            <div key={cat.id}>
              {search&&<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,marginTop:6}}><div style={{width:26,height:26,background:cat.color,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>{cat.icon}</div><h2 style={{fontSize:17,fontWeight:700}}>{cat.title}</h2></div>}
              {cat.sections.map((section,i)=><Section key={i} section={section}/>)}
              {search&&<div style={{height:1,background:"rgba(255,255,255,0.06)",margin:"16px 0"}}/>}
            </div>
          ))}
          {search&&filtered.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:"#64748B"}}><p style={{fontSize:32}}>🔍</p><p>No results found</p></div>}
        </div>
        <p style={{textAlign:"center",color:"#334155",fontSize:11,marginTop:28}}>⚡ Electrical Handbook · Student Reference</p>
      </div>
    </div>
  );
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script><script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js');
  });
}
</script>
</body>
</html>
